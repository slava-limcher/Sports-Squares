<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Game Day Squares — TV Preview</title>
<style>html,body{margin:0;min-height:100%;background:#06101f}iframe{border:0;width:100vw;height:100vh;display:block}</style>
</head>
<body>
  <!-- Shows exactly what a TV displays: runs in demo mode (?tv&demo) with no
       host, no Supabase and no room code. With no ?sport it rotates through
       every sport; with ?sport=nba (etc.) it locks to that one sport. -->
  <iframe id="f" title="TV preview" allowfullscreen></iframe>
  <script>var s=new URLSearchParams(location.search).get('sport');var base=location.href.split('#')[0].split('?')[0].replace(/[^/]*$/,'index.html');document.getElementById('f').src=base+'?tv&demo'+(s?'&sport='+encodeURIComponent(s):'');</script>
</body>
</html>
